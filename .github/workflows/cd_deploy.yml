name: Production Deployment Gate

on:
  repository_dispatch:
    # Matches the event_type triggered by your native LXC node bridge script
    types: [openproject_deployment_approved]

jobs:
  test_connection_and_gate:
    name: Verify Approval Gate and SSH Connection
    runs-on: ubuntu-latest
    
    steps:
      - name: Announce Release Initialization
        run: |
          echo "=========================================================="
          echo "🔒 RELEASE UNLOCKED BY OPENPROJECT CAB APPROVAL"
          echo "🎫 OpenProject Ticket ID: ${{ github.event.client_payload.ticket_id }}"
          echo "📝 Ticket Summary: ${{ github.event.client_payload.summary }}"
          echo "=========================================================="
